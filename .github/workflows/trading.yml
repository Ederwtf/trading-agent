name: trading-agent

on:
  schedule:
    # Cada 15 min L–V (UTC). El orquestador (modo auto) no-opea si el mercado está cerrado
    # y decide la sesión con el reloj de Alpaca → inmune a DST y feriados.
    - cron: "*/15 * * * 1-5"
  workflow_dispatch: {}        # ejecución manual para pruebas

permissions:
  contents: write              # para commitear el journal de vuelta al repo

concurrency:
  group: trading
  cancel-in-progress: false    # no solapar corridas (evita órdenes/commits en carrera)

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL:        meta-llama/llama-4-scout-17b-16e-instruct
      ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL:   https://paper-api.alpaca.markets
      TZ:                America/New_York    # solo para que los logs se lean en hora ET
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar orquestador (auto)
        run: python orchestrator.py auto

      - name: Commit del journal (estado + auditoría)
        run: |
          git config user.name  "trading-bot"
          git config user.email "actions@users.noreply.github.com"
          git add journal/
          if git diff --cached --quiet; then
            echo "Sin cambios en journal/"
          else
            git commit -m "journal $(date -u +%FT%TZ)"
            git pull --rebase --autostash
            git push
          fi
